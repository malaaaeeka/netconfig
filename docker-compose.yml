version: '3.8'

services:
  backend:
    build: ./ai-chatbot-backend
    ports:
      - "5002:5002"
    env_file:
      - ./ai-chatbot-backend/.env

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./ai-network-chatbot:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"